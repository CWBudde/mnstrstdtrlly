name: Deploy to GitHub Pages

# Veröffentlicht den Vite-Build auf dem gh-pages-Branch. GitHub aktiviert
# Pages für diesen Branch automatisch - es ist kein manueller Eingriff in
# den Repo-Einstellungen nötig. (Der "GitHub Actions"-Source-Modus würde
# ein einmaliges Anlegen der Pages-Site über die Settings-UI erfordern.)

on:
  push:
    branches: [main, 'claude/munster-city-rally-r2i9xd']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: touch dist/.nojekyll
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
